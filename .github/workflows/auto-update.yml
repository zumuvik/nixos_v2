name: Update Flake and Build

on:
  schedule:
    - cron: "0 2 * * *" # каждый день в 02:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: automated-flake-update
  cancel-in-progress: false

jobs:
  update-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Connect Cachix
        uses: cachix/cachix-action@v17
        with:
          name: zumuvik
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Update flake.lock
        run: nix flake update

      - name: Check for lock file changes
        id: changes
        shell: bash
        run: |
          if git diff --quiet -- flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "flake.lock is already up to date"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "flake.lock was updated"
            git diff --stat -- flake.lock
          fi

      - name: Build all NixOS configurations
        if: steps.changes.outputs.changed == 'true'
        run: |
          nix build \
            .#nixosConfigurations.nixlensk321.config.system.build.toplevel \
            .#nixosConfigurations.nixlensk322.config.system.build.toplevel \
            --print-build-logs \
            --no-link

      - name: Create or update pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: automated/flake-update
          delete-branch: true

          add-paths: |
            flake.lock

          commit-message: "chore: update flake.lock"
          title: "[Auto] Update flake.lock"

          body: |
            Automated update of `flake.lock`.

            Both NixOS configurations were successfully built:

            - `nixlensk321`
            - `nixlensk322`

            Newly built store paths were uploaded to Cachix.
