name: Update Flake and Build

on:
  schedule:
    - cron: "0 2 * * *" # каждый день в 02:00 UTC

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: automated-flake-update
  cancel-in-progress: false

env:
  CACHE_NAME: zumuvik

jobs:
  update-and-build:
    name: Update, build and cache
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      # Подключаем Cachix как substituter, но отключаем автоматическую
      # загрузку — ниже она будет выполнена отдельным проверяемым шагом.
      - name: Connect Cachix
        uses: cachix/cachix-action@v17
        with:
          name: ${{ env.CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          skipPush: true

      - name: Update flake.lock
        shell: bash
        run: |
          set -euo pipefail

          nix flake update

      - name: Check for flake.lock changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- flake.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "flake.lock is already up to date"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "flake.lock was updated"

            git diff --stat -- flake.lock
          fi

      - name: Check flake, formatting and linting
        if: success() && steps.changes.outputs.changed == 'true'
        run: nix flake check --print-build-logs

      - name: Build all NixOS configurations
        if: success() && steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          nix build \
            .#nixosConfigurations.nixlensk321.config.system.build.toplevel \
            .#nixosConfigurations.nixlensk322.config.system.build.toplevel \
            --print-build-logs \
            --print-out-paths \
            --no-link \
            > build-paths.txt

          # Проверяем, что Nix действительно вернул store paths.
          test -s build-paths.txt

          # Удаляем возможные дубликаты.
          sort -u -o build-paths.txt build-paths.txt

          echo "Successfully built:"
          cat build-paths.txt

      - name: Push build outputs to Cachix
        if: success() && steps.changes.outputs.changed == 'true'
        shell: bash
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          set -euo pipefail

          # Cachix загрузит указанные outputs вместе с их closure.
          cachix push "$CACHE_NAME" < build-paths.txt

      - name: Verify outputs in Cachix
        if: success() && steps.changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          while IFS= read -r store_path; do
            if [[ "$store_path" != /nix/store/* ]]; then
              echo "Invalid Nix store path: $store_path"
              exit 1
            fi

            store_name="${store_path##*/}"
            store_hash="${store_name%%-*}"
            narinfo_url="https://${CACHE_NAME}.cachix.org/${store_hash}.narinfo"

            echo "Checking: $store_path"

            curl \
              --fail \
              --silent \
              --show-error \
              --retry 8 \
              --retry-delay 3 \
              --retry-all-errors \
              "$narinfo_url" \
              --output /dev/null

            echo "Available in Cachix: $store_path"
          done < build-paths.txt

      - name: Create or update pull request
        if: success() && steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

          base: main
          branch: automated/flake-update
          delete-branch: true

          add-paths: |
            flake.lock

          commit-message: "chore: update flake.lock"
          title: "[Auto] Update flake.lock"

          body: |
            Automated update of `flake.lock`.

            Validation completed successfully:

            - `nixlensk321` built successfully
            - `nixlensk322` built successfully
            - resulting Nix store closures were uploaded to Cachix
            - top-level system outputs were verified through Cachix narinfo
