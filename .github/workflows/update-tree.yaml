name: Update repository tree

on:
  push:
    branches:
      - main

    paths-ignore:
      - README.md

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-repository-tree
  cancel-in-progress: true

jobs:
  update-tree:
    name: Update README tree
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for structural changes
        id: structural_changes
        shell: bash
        run: |
          set -euo pipefail

         
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          after="${{ github.sha }}"

          # Добавленные, удалённые и переименованные файлы.
          changes="$(
            git diff \
              --name-status \
              --diff-filter=ADR \
              "$before" \
              "$after"
          )"

          if [[ -n "$changes" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"

            echo "Structural changes:"
            printf '%s\n' "$changes"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No structural changes detected"
          fi

      - name: Install tree
        if: steps.structural_changes.outputs.changed == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install --yes tree

      - name: Generate README
        if: steps.structural_changes.outputs.changed == 'true'
        shell: bash
        run: |
          {
            echo '<!-- Automatically generated by update-tree.yml -->'
            echo
            echo '```nix'
            tree \
              -a \
              --dirsfirst \
              -I '.git|result|result-*'
            echo
            echo '```'
          } > README.md

      - name: Commit updated README
        if: steps.structural_changes.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- README.md; then
            echo "README tree is already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add README.md
          git commit -m "docs: update repository tree"
          git push
